<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The Trend List – Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #333;
      margin: 0;
    }

    /* Header */
    .site-header {
      background: #ffffff;
      padding: 3rem 1rem 2rem;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
    }

    .header-logo img {
      max-width: 280px;
      height: auto;
    }

    /* Main content */
    .maintenance-wrapper {
      text-align: center;
      padding: 6rem 1rem;
    }

    .notice {
      display: inline-block;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 3rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
      max-width: 480px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      color: #666;
      line-height: 1.6;
    }

    /* Footer */
    .site-footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9rem;
      color: #999;
      border-top: 1px solid #f0f0f0;
      background: #fff;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-logo">
      <a href="/">
        <img src="/static/img/The-Trend-List-Logo.jpg" alt="The Trend List logo">
      </a>
    </div>
  </header>

  <!-- Maintenance Message -->
  <main class="maintenance-wrapper">
    <div class="notice">
      <h1>We’re Making Some Updates</h1>
      <p>The Trend List is currently offline while we make improvements.<br>
      We’ll be back shortly.</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    © 2026 The Trend List
  </footer>

</body>
</html>
